title: Seminar Course
description: Academic Seminar

# GitHub Pages:
# - user/organization site => baseurl: ""
# - project site => baseurl: "/<repo-name>"
url: ""
baseurl: "/SeminarC_Sommer"

theme: null
markdown: kramdown
permalink: pretty

# Logo exibida no topo da sidebar
course_logo: "/assets/images/jgu-logo.png"

# Navegação do curso
course_navigation:
  main:
    - title: Home
      path: /
    - title: Zeitplan
      path: /schedule
    - title: Anweisungen
      path: /instructions

  follien:
    - title: Sitzung 1
      path: /seminars/week01
    - title: Sitzung 2
      path: /seminars/week02
    - title: Sitzung 3
      path: /seminars/week03
    - title: Sitzung 4
      path: /seminars/week04

  readings:
    - title: Core
      path: /readings/core

defaults:
  - scope:
      path: ""
    values:
      layout: default
