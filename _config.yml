title: Seminar Course
description: Academic Seminar

# GitHub Pages:
# - user/organization site => baseurl: ""
# - project site => baseurl: "/<repo-name>"
url: ""
baseurl: "/SeminarC_Sommer"

theme: null
markdown: kramdown
permalink: pretty

# Logo exibida no topo da sidebar (adicione o arquivo em assets/images/)
course_logo: "/assets/images/jgu-logo.png"

# Modelo de navegação local (links da própria pasta/repositório).
course_navigation:
  main:
    - title: Home
      path: /
    - title: Schedule
      path: /schedule
    - title: Instructions
      path: /instructions
  follien:
    - title: Week 1
      path: /seminars/week01
      slides: /assets/follien/1.pdf
    - title: Week 2
      path: /seminars/week02
      slides: /assets/follien/2.pdf
    - title: Week 3
      path: /seminars/week03
      slides: /assets/follien/3.pdf
    - title: Week 4
      path: /seminars/week04
      slides: /assets/follien/4.pdf
  readings:
    - title: Core
      path: /readings/core

defaults:
  - scope:
      path: ""
    values:
      layout: default
